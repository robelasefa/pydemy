[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --cov=pydemy
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
markers =
    asyncio: marks tests as async
    slow: marks tests as slow
    integration: marks tests as integration tests
